# ──────────────────────────────────────────────────────────────
# RK DXB Trader — Render Keep-Alive
# Pings the server every 10 minutes so Render free tier doesn't
# sleep. GitHub Actions is 100% free for public repositories.
# No UptimeRobot or any external account needed.
# ──────────────────────────────────────────────────────────────
name: Keep Server Alive

on:
  schedule:
    # Every 10 minutes, 24/7
    - cron: '*/10 * * * *'
  workflow_dispatch:   # allow manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping RK DXB Trader server
        run: |
          echo "Pinging server at $(date -u)"
          curl -sf https://rk-dxb-trader.onrender.com/ping && echo " ✅ Server alive" || echo " ⚠️ Server waking up (first request after sleep)"
