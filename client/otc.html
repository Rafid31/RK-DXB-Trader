<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RK DXB Trader — OTC Signals</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#030509;--panel:#080d1a;--panel2:#0c1220;
  --border:rgba(255,140,0,0.1);--border2:rgba(255,140,0,0.3);
  --accent:#ff8c00;--gold:#ffd060;
  --buy:#00e676;--sell:#ff3f5a;--wait:#3a4a6a;
  --text:#eef2ff;--muted:#4a5a80;--muted2:#1e2a40;
  --cyan:#00d4ff;--purple:#a855f7;
  --font:'Syne',sans-serif;--mono:'Space Mono',monospace;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--font);overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 70% 35% at 50% 0%,rgba(255,140,0,0.05),transparent),
             radial-gradient(ellipse 50% 25% at 90% 90%,rgba(0,212,255,0.03),transparent);
  pointer-events:none;z-index:0}

/* HEADER */
.hdr{position:sticky;top:0;z-index:100;height:52px;
  background:rgba(3,5,9,0.96);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:12px}
.logo{font-size:15px;font-weight:800;letter-spacing:-0.3px}
.logo span{color:var(--accent)}
.otc-pill{font-size:10px;font-family:var(--mono);padding:3px 10px;border-radius:12px;
  background:rgba(255,140,0,0.1);border:1px solid var(--border2);color:var(--accent);letter-spacing:1px}
.sp{flex:1}
.utc{font-family:var(--mono);font-size:12px;color:var(--cyan)}
.conn{display:flex;align-items:center;gap:5px;font-size:11px;font-family:var(--mono);
  padding:3px 10px;border-radius:12px;border:1px solid}
.conn.live{background:rgba(0,230,118,0.07);border-color:rgba(0,230,118,0.25);color:var(--buy)}
.conn.off{background:rgba(255,63,90,0.07);border-color:rgba(255,63,90,0.25);color:var(--sell)}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.conn.live .dot{animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.back{padding:5px 12px;background:transparent;border:1px solid var(--border2);
  border-radius:7px;color:var(--text);font-size:11px;font-weight:700;
  text-decoration:none;font-family:var(--font)}
.back:hover{background:rgba(255,140,0,0.08)}
.lgout{padding:5px 12px;background:transparent;border:1px solid var(--border);
  border-radius:7px;color:var(--muted);font-size:11px;cursor:pointer;font-family:var(--font)}

/* TOP BAR */
.topbar{position:relative;z-index:1;
  padding:8px 20px;background:rgba(8,13,26,0.9);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.src-badge{display:flex;align-items:center;gap:6px;font-size:10px;font-family:var(--mono);
  padding:3px 10px;border-radius:12px;background:rgba(255,140,0,0.07);
  border:1px solid var(--border);color:var(--accent)}
.src-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:pulse 1s infinite}
.timer-wrap{display:flex;align-items:center;gap:10px;flex:1;max-width:400px}
.timer-lbl{font-size:10px;font-family:var(--mono);color:var(--muted);white-space:nowrap}
.tbar{flex:1;height:4px;background:var(--muted2);border-radius:2px;overflow:hidden}
.tfill{height:100%;border-radius:2px;transition:width 0.9s linear;background:var(--accent)}
.tfill.warn{background:var(--sell)}
.tsecs{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--accent);min-width:28px}
.tsecs.warn{color:var(--sell);animation:blink 0.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}

/* FINAL SIGNAL BANNER — shown last 10s */
.final-banner{
  position:fixed;bottom:0;left:0;right:0;z-index:999;
  padding:0;height:0;overflow:hidden;
  transition:height 0.3s ease;background:transparent}
.final-banner.show{height:90px}
.final-inner{
  height:90px;display:flex;align-items:center;justify-content:center;gap:20px;
  padding:0 24px;font-family:var(--font)}
.final-banner.buy .final-inner{background:linear-gradient(90deg,rgba(0,230,118,0.95),rgba(0,180,90,0.95))}
.final-banner.sell .final-inner{background:linear-gradient(90deg,rgba(255,63,90,0.95),rgba(200,0,50,0.95))}
.final-banner.wait .final-inner{background:linear-gradient(90deg,rgba(30,42,64,0.97),rgba(20,30,50,0.97));border-top:1px solid var(--border)}
.final-icon{font-size:36px}
.final-text{display:flex;flex-direction:column;gap:2px}
.final-dir{font-size:28px;font-weight:800;color:#000;letter-spacing:1px}
.final-banner.sell .final-dir,.final-banner.wait .final-dir{color:#fff}
.final-sub{font-size:12px;font-family:var(--mono);color:rgba(0,0,0,0.6);letter-spacing:1px}
.final-banner.sell .final-sub,.final-banner.wait .final-sub{color:rgba(255,255,255,0.6)}
.final-pairs{display:flex;flex-wrap:wrap;gap:8px;flex:1;justify-content:flex-end}
.fp-chip{padding:6px 12px;border-radius:8px;font-size:12px;font-weight:800;
  background:rgba(0,0,0,0.2);color:#fff;font-family:var(--font)}
.final-dismiss{font-size:11px;font-family:var(--mono);color:rgba(255,255,255,0.5);cursor:pointer;
  padding:6px 12px;border:1px solid rgba(255,255,255,0.2);border-radius:6px}

/* STATS */
.stats{position:relative;z-index:1;margin:14px 20px 0;padding:12px 16px;
  background:var(--panel);border:1px solid var(--border);border-radius:12px;
  display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.stat{display:flex;flex-direction:column;gap:2px}
.slbl{font-size:9px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.sval{font-size:18px;font-weight:800}
.sval.b{color:var(--buy)}.sval.s{color:var(--sell)}.sval.n{color:var(--text)}
.sdiv{width:1px;height:28px;background:var(--border)}
.conf-note{margin-left:auto;font-size:10px;font-family:var(--mono);color:var(--muted);
  padding:4px 10px;border-radius:6px;background:rgba(255,140,0,0.05);border:1px solid var(--border)}

/* GRID */
.ghdr{position:relative;z-index:1;padding:14px 20px 8px;
  display:flex;align-items:center;justify-content:space-between}
.gtitle{font-size:10px;font-family:var(--mono);color:var(--muted);letter-spacing:1.5px;text-transform:uppercase}
.gupdated{font-size:10px;font-family:var(--mono);color:var(--muted)}
.grid{position:relative;z-index:1;padding:0 20px 100px;
  display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:1050px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:650px){.grid{grid-template-columns:1fr}}

/* PAIR CARD */
.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;
  padding:16px;position:relative;overflow:hidden;transition:border-color 0.3s;
  border-top:2px solid rgba(255,140,0,0.15)}
.card.buy{border-top-color:var(--buy);background:linear-gradient(160deg,rgba(0,230,118,0.05) 0%,var(--panel) 50%)}
.card.sell{border-top-color:var(--sell);background:linear-gradient(160deg,rgba(255,63,90,0.05) 0%,var(--panel) 50%)}
.card.confirmed-buy{border-color:rgba(0,230,118,0.5);border-top-color:var(--buy);
  box-shadow:0 0 20px rgba(0,230,118,0.12)}
.card.confirmed-sell{border-color:rgba(255,63,90,0.5);border-top-color:var(--sell);
  box-shadow:0 0 20px rgba(255,63,90,0.12)}

/* TOP ROW */
.crow{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.pname{font-size:18px;font-weight:800;letter-spacing:-0.3px}
.ptags{display:flex;gap:5px;margin-top:3px;align-items:center}
.otag{font-size:8px;font-family:var(--mono);padding:2px 6px;border-radius:3px;
  background:rgba(255,140,0,0.08);color:var(--accent);border:1px solid rgba(255,140,0,0.25);letter-spacing:1px}
.ctag{font-size:8px;font-family:var(--mono);padding:2px 6px;border-radius:3px;
  background:rgba(168,85,247,0.08);color:var(--purple);border:1px solid rgba(168,85,247,0.25);letter-spacing:1px}
.conf-tag{font-size:8px;font-family:var(--mono);padding:2px 7px;border-radius:3px;letter-spacing:1px}
.conf-tag.confirmed{background:rgba(255,208,96,0.1);color:var(--gold);border:1px solid rgba(255,208,96,0.3)}
.conf-tag.raw{background:rgba(74,90,128,0.1);color:var(--muted);border:1px solid rgba(74,90,128,0.2)}

/* SIGNAL BUTTON */
.sigbtn{padding:8px 16px;border-radius:9px;font-family:var(--font);
  font-size:13px;font-weight:800;letter-spacing:1px;border:none;cursor:default;
  display:flex;align-items:center;gap:6px}
.sigbtn.buy{background:linear-gradient(135deg,var(--buy),#00b359);color:#000;
  box-shadow:0 4px 16px rgba(0,230,118,0.3)}
.sigbtn.sell{background:linear-gradient(135deg,var(--sell),#cc0033);color:#fff;
  box-shadow:0 4px 16px rgba(255,63,90,0.3)}
.sigbtn.wait{background:rgba(58,74,106,0.2);color:var(--muted);
  border:1px solid rgba(58,74,106,0.3);font-size:11px}

/* CONFIDENCE */
.confrow{margin-bottom:10px}
.conflbl{display:flex;justify-content:space-between;margin-bottom:4px}
.confname{font-size:9px;font-family:var(--mono);color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.confpct{font-size:11px;font-family:var(--mono);font-weight:700}
.confpct.hi{color:var(--buy)}.confpct.md{color:var(--gold)}.confpct.lo{color:var(--muted)}
.conftrack{height:4px;background:var(--muted2);border-radius:2px;overflow:hidden}
.conffill{height:100%;border-radius:2px;transition:width 0.4s ease}
.conffill.buy{background:linear-gradient(90deg,#00b359,var(--buy))}
.conffill.sell{background:linear-gradient(90deg,#cc0033,var(--sell))}
.conffill.wait{background:var(--muted2)}

/* INDICATORS ROW */
.inds{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:10px}
.ind{background:var(--panel2);border:1px solid var(--border);border-radius:7px;padding:6px 5px;text-align:center}
.indn{font-size:8px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px}
.indv{font-size:11px;font-family:var(--mono);font-weight:700}
.indv.up,.indv.bullish{color:var(--buy)}.indv.dn,.indv.bearish{color:var(--sell)}.indv.neutral{color:var(--muted)}

/* SIGNAL HISTORY DOTS */
.hist-row{display:flex;align-items:center;gap:4px;margin-bottom:8px}
.hist-lbl{font-size:9px;font-family:var(--mono);color:var(--muted);margin-right:4px}
.hdot{width:10px;height:10px;border-radius:50%;border:1px solid}
.hdot.buy{background:rgba(0,230,118,0.3);border-color:var(--buy)}
.hdot.sell{background:rgba(255,63,90,0.3);border-color:var(--sell)}
.hdot.wait{background:rgba(58,74,106,0.2);border-color:var(--muted)}

/* TAGS */
.tags{display:flex;flex-wrap:wrap;gap:4px;min-height:18px}
.tag{font-size:9px;font-family:var(--mono);padding:2px 7px;border-radius:4px;
  background:rgba(255,255,255,0.03);border:1px solid var(--border);color:var(--muted)}

/* DATA PROGRESS */
.dqrow{display:flex;align-items:center;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.dqbar{flex:1;height:2px;background:var(--muted2);border-radius:1px;overflow:hidden}
.dqfill{height:100%;background:var(--accent);border-radius:1px}
.dqlbl{font-size:9px;font-family:var(--mono);color:var(--muted)}

/* SKELETON */
.card.skel{animation:shimmer 1.5s ease infinite}
@keyframes shimmer{0%,100%{opacity:0.4}50%{opacity:0.8}}
.skline{height:12px;background:var(--muted2);border-radius:3px;margin-bottom:8px}
</style>
</head>
<body>

<header class="hdr">
  <div class="logo">RK<span>DXB</span> Trader</div>
  <div class="otc-pill">⚡ OTC SIGNALS</div>
  <div class="sp"></div>
  <span class="utc" id="clk">--:--:--</span>
  <div class="conn off" id="conn"><div class="dot"></div><span id="connTxt">Connecting</span></div>
  <a href="dashboard.html" class="back">← Real Market</a>
  <button class="lgout" onclick="logout()">Logout</button>
</header>

<div class="topbar">
  <div class="src-badge"><div class="src-dot"></div>po-static.com LIVE</div>
  <div class="timer-wrap">
    <span class="timer-lbl">NEXT CANDLE</span>
    <div class="tbar"><div class="tfill" id="tfill" style="width:50%"></div></div>
    <span class="tsecs" id="tsecs">--s</span>
  </div>
  <span style="font-size:10px;font-family:var(--mono);color:var(--muted);margin-left:auto">12 OTC pairs · Confirmed signals</span>
</div>

<!-- STATS BAR -->
<div class="stats">
  <div class="stat"><div class="slbl">BUY</div><div class="sval b" id="sB">—</div></div>
  <div class="sdiv"></div>
  <div class="stat"><div class="slbl">SELL</div><div class="sval s" id="sS">—</div></div>
  <div class="sdiv"></div>
  <div class="stat"><div class="slbl">WAIT</div><div class="sval n" id="sW">—</div></div>
  <div class="sdiv"></div>
  <div class="stat"><div class="slbl">Best Signal</div><div class="sval n" id="sBest" style="font-size:14px">Building...</div></div>
  <div class="conf-note">✅ Confirmed = 3× in a row · No flip-flop</div>
</div>

<!-- GRID -->
<div class="ghdr">
  <span class="gtitle">// OTC SIGNALS — POCKET OPTION · 12 PAIRS</span>
  <span class="gupdated" id="upd">—</span>
</div>
<div class="grid" id="grid"></div>

<!-- FINAL SIGNAL BANNER (last 10s) -->
<div class="final-banner" id="finalBanner">
  <div class="final-inner">
    <div class="final-icon" id="finalIcon">⚡</div>
    <div class="final-text">
      <div class="final-dir" id="finalDir">—</div>
      <div class="final-sub" id="finalSub">ENTER NOW</div>
    </div>
    <div class="final-pairs" id="finalPairs"></div>
    <span class="final-dismiss" onclick="dismissFinal()">✕ DISMISS</span>
  </div>
</div>

<script>
// ── Auth ────────────────────────────────────────────────────
const EMAIL = localStorage.getItem('rk_auth_email');
const TOKEN = localStorage.getItem('rk_auth_token');
if (!EMAIL || !TOKEN) location.href='index.html';

async function logout() {
  try { await fetch('https://rk-dxb-trader.onrender.com/api/auth/logout',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:EMAIL})}); } catch(e) {}
  localStorage.removeItem('rk_auth_email');localStorage.removeItem('rk_auth_token');
  location.href='index.html';
}

// ── Clock ────────────────────────────────────────────────────
setInterval(() => {
  const n=new Date();
  document.getElementById('clk').textContent=`UTC ${pad(n.getUTCHours())}:${pad(n.getUTCMinutes())}:${pad(n.getUTCSeconds())}`;
},1000);
function pad(n){return String(n).padStart(2,'0');}

// ── Timer ────────────────────────────────────────────────────
function updateTimer() {
  const n=new Date(), secs=60-n.getUTCSeconds(), pct=(secs/60)*100;
  const fill=document.getElementById('tfill'), sel=document.getElementById('tsecs');
  fill.style.width=pct+'%';
  sel.textContent=secs+'s';
  const warn=secs<=10;
  fill.className='tfill'+(warn?' warn':'');
  sel.className='tsecs'+(warn?' warn':'');
  // Show final banner at ≤10s
  if (warn && lastState) showFinalBanner(secs);
  else if (!warn) hideFinalBanner();
}
setInterval(updateTimer,1000);

// ── Final Banner ─────────────────────────────────────────────
let bannerDismissed=false;
let lastState=null;

function showFinalBanner(secsLeft) {
  if (bannerDismissed || !lastState) return;
  const pairs=lastState.pairs;
  
  // Only show CONFIRMED signals
  const confirmed=pairs.filter(p=>p.isConfirmed && p.signal!=='WAIT' && p.confidence>=65);
  if (confirmed.length===0) return;
  
  // Find the dominant signal direction
  const buys=confirmed.filter(p=>p.signal==='BUY');
  const sells=confirmed.filter(p=>p.signal==='SELL');
  const dominant=buys.length>=sells.length ? 'BUY' : 'SELL';
  const domPairs=dominant==='BUY' ? buys : sells;
  
  if (domPairs.length===0) return;
  
  const banner=document.getElementById('finalBanner');
  const best=domPairs.sort((a,b)=>b.confidence-a.confidence)[0];
  
  banner.className='final-banner show '+(dominant==='BUY'?'buy':'sell');
  document.getElementById('finalIcon').textContent=dominant==='BUY'?'▲':'▼';
  document.getElementById('finalDir').textContent=dominant==='BUY'?'GO UP — CALL':'GO DOWN — PUT';
  document.getElementById('finalSub').textContent=`${secsLeft}s LEFT · ${domPairs.length} pair${domPairs.length>1?'s':''} confirmed · ${best.confidence}% confidence`;
  
  const pairsEl=document.getElementById('finalPairs');
  pairsEl.innerHTML=domPairs.slice(0,4).map(p=>
    `<div class="fp-chip">${p.displayName.replace(' OTC','')}</div>`
  ).join('');
}

function hideFinalBanner() {
  bannerDismissed=false;
  document.getElementById('finalBanner').className='final-banner';
}
function dismissFinal(){
  bannerDismissed=true;
  document.getElementById('finalBanner').className='final-banner';
}

// ── Helpers ──────────────────────────────────────────────────
function iClass(v,t){
  if(v===null||v===undefined) return 'neutral';
  if(t==='macd'||t==='ema') return typeof v==='string'?(v==='UP'||v.includes('bull')?'bullish':v==='DN'||v.includes('bear')?'bearish':'neutral'):'neutral';
  if(t==='rsi') return v>=65?'dn':v<=35?'up':'neutral';
  if(t==='stoch') return v>=80?'dn':v<=20?'up':'neutral';
  if(t==='wr') return v>=-20?'dn':v<=-80?'up':'neutral';
  return 'neutral';
}
function iV(v){return (v===null||v===undefined)?'—':String(v);}
function pClass(c){return c>=80?'hi':c>=65?'md':'lo';}

// ── Render card ──────────────────────────────────────────────
function renderCard(p) {
  const sig=p.signal.toLowerCase();
  const isCrypto=p.isCrypto;
  const isConf=p.isConfirmed && p.signal!=='WAIT';
  const cardCls=`card ${sig}${isConf?' confirmed-'+sig:''}`;
  const dq=Math.min(100,Math.round((p.candleCount/20)*100));
  const shortName=p.displayName.replace(' OTC','');
  
  // Signal history dots
  const hist=(p.signalHistory||[]).slice(-5);
  const histDots=hist.map(s=>`<div class="hdot ${s.toLowerCase()}"></div>`).join('');
  
  return `<div class="${cardCls}" id="c-${p.symbol}">
    <div class="crow">
      <div>
        <div class="pname">${shortName}</div>
        <div class="ptags">
          ${isCrypto?'<span class="ctag">⚡ CRYPTO</span>':'<span class="otag">OTC</span>'}
          ${isConf?'<span class="conf-tag confirmed">✓ CONFIRMED</span>':'<span class="conf-tag raw">RAW</span>'}
        </div>
      </div>
      <div class="sigbtn ${sig}">
        ${sig==='buy'?'▲ BUY':sig==='sell'?'▼ SELL':'⏸ WAIT'}
      </div>
    </div>

    <div class="confrow">
      <div class="conflbl">
        <span class="confname">CONFIDENCE</span>
        <span class="confpct ${pClass(p.confidence)}">${p.confidence}%</span>
      </div>
      <div class="conftrack">
        <div class="conffill ${sig}" style="width:${p.confidence}%"></div>
      </div>
    </div>

    <div class="inds">
      <div class="ind"><div class="indn">RSI</div><div class="indv ${iClass(p.rsi,'rsi')}">${iV(p.rsi)}</div></div>
      <div class="ind"><div class="indn">STOCH</div><div class="indv ${iClass(p.stoch,'stoch')}">${iV(p.stoch)}</div></div>
      <div class="ind"><div class="indn">MACD</div><div class="indv ${iClass(p.macd,'macd')}">${iV(p.macd)}</div></div>
      <div class="ind"><div class="indn">EMA</div><div class="indv ${iClass(p.emaTrend,'ema')}">${iV(p.emaTrend)}</div></div>
    </div>

    <div class="hist-row">
      <span class="hist-lbl">LAST 5:</span>${histDots}
      ${p.rawSignal&&p.rawSignal!==p.signal?`<span style="font-size:9px;font-family:var(--mono);color:var(--muted);margin-left:6px">raw:${p.rawSignal}</span>`:''}
    </div>

    <div class="tags">
      ${(p.reasons||[]).slice(0,3).map(r=>`<span class="tag">${r}</span>`).join('')}
      ${p.pattern&&p.pattern!=='none'?`<span class="tag" style="color:var(--gold);border-color:rgba(255,208,96,0.2)">${p.pattern}</span>`:''}
    </div>

    <div class="dqrow">
      <div class="dqlbl">${p.candleCount}c</div>
      <div class="dqbar"><div class="dqfill" style="width:${dq}%"></div></div>
      <div class="dqlbl">${dq<100?'Building...':'Ready ✓'}</div>
    </div>
  </div>`;
}

// ── Render full state ────────────────────────────────────────
let init=false;
function renderState(state) {
  lastState=state;
  const pairs=state.pairs;
  const grid=document.getElementById('grid');

  if(!init){
    grid.innerHTML=pairs.map(renderCard).join('');
    init=true;
  } else {
    pairs.forEach(p=>{
      const el=document.getElementById('c-'+p.symbol);
      if(el){
        const tmp=document.createElement('div');
        tmp.innerHTML=renderCard(p);
        el.replaceWith(tmp.firstElementChild);
      }
    });
  }

  // Stats
  const buys=pairs.filter(p=>p.signal==='BUY').length;
  const sells=pairs.filter(p=>p.signal==='SELL').length;
  document.getElementById('sB').textContent=buys;
  document.getElementById('sS').textContent=sells;
  document.getElementById('sW').textContent=pairs.filter(p=>p.signal==='WAIT').length;
  
  const best=pairs.filter(p=>p.signal!=='WAIT'&&p.isConfirmed).sort((a,b)=>b.confidence-a.confidence)[0]
    || pairs.filter(p=>p.signal!=='WAIT').sort((a,b)=>b.confidence-a.confidence)[0];
  const bestEl=document.getElementById('sBest');
  if(best){
    bestEl.textContent=`${best.displayName.replace(' OTC','')} ${best.signal} ${best.confidence}%${best.isConfirmed?' ✓':''}`;
    bestEl.style.color=best.signal==='BUY'?'var(--buy)':'var(--sell)';
  } else bestEl.textContent='Building...';

  const t=new Date(state.serverTime);
  document.getElementById('upd').textContent=`Updated ${pad(t.getUTCHours())}:${pad(t.getUTCMinutes())} UTC`;
}

// ── WebSocket ────────────────────────────────────────────────
const WSU=location.hostname==='localhost'?'ws://localhost:3001':'wss://rk-dxb-trader.onrender.com';
let ws, rtimer;

function connect(){
  document.getElementById('conn').className='conn off';
  document.getElementById('connTxt').textContent='Connecting';
  ws=new WebSocket(WSU);
  ws.onopen=()=>{
    clearTimeout(rtimer);
    ws.send(JSON.stringify({type:'auth',email:EMAIL,token:TOKEN}));
  };
  ws.onmessage=e=>{
    try {
      const msg=JSON.parse(e.data);
      if(msg.type==='auth_ok'){
        document.getElementById('conn').className='conn live';
        document.getElementById('connTxt').textContent='Live';
        return;
      }
      if(msg.type==='kicked'||msg.type==='auth_failed'){
        alert('Session ended. Please login again.');
        localStorage.removeItem('rk_auth_email');localStorage.removeItem('rk_auth_token');
        location.href='index.html';return;
      }
      if(msg.type==='otc') renderState(msg);
    } catch(e){}
  };
  ws.onclose=()=>{
    document.getElementById('conn').className='conn off';
    document.getElementById('connTxt').textContent='Reconnecting';
    rtimer=setTimeout(connect,4000);
  };
  ws.onerror=()=>ws.close();
}

// Show skeletons
document.getElementById('grid').innerHTML=[
  'EUR/USD','GBP/USD','USD/JPY','AUD/USD','USD/CAD','EUR/GBP',
  'GBP/JPY','EUR/JPY','USD/CHF','NZD/USD','BTC/USD','ETH/USD'
].map(n=>`<div class="card skel">
  <div style="font-size:17px;font-weight:800;margin-bottom:12px">${n} OTC</div>
  <div class="skline" style="width:60%"></div>
  <div class="skline" style="width:100%;height:4px;margin:14px 0"></div>
  <div class="skline" style="width:80%"></div>
</div>`).join('');

connect();
// REST fallback every 3s
setInterval(()=>{
  fetch('https://rk-dxb-trader.onrender.com/api/otc')
    .then(r=>r.json()).then(renderState).catch(()=>{});
},3000);
setTimeout(()=>{
  fetch('https://rk-dxb-trader.onrender.com/api/otc')
    .then(r=>r.json()).then(renderState).catch(()=>{});
},1000);
</script>
