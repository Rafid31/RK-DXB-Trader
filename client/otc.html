<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RK DXB Trader — OTC Signals</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#030509;--panel:#080d1a;--panel2:#0c1220;
  --border:rgba(255,140,0,0.1);--border2:rgba(255,140,0,0.3);
  --accent:#ff8c00;--gold:#ffd060;
  --buy:#00e676;--sell:#ff3f5a;--wait:#3a4a6a;
  --text:#eef2ff;--muted:#4a5a80;--muted2:#1e2a40;
  --cyan:#00d4ff;--purple:#a855f7;
  --font:'Syne',sans-serif;--mono:'Space Mono',monospace;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--font);overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 70% 35% at 50% 0%,rgba(255,140,0,0.05),transparent),
             radial-gradient(ellipse 50% 25% at 90% 90%,rgba(0,212,255,0.03),transparent);
  pointer-events:none;z-index:0}

/* HEADER */
.hdr{position:sticky;top:0;z-index:100;height:52px;
  background:rgba(3,5,9,0.96);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:12px}
.logo{font-size:15px;font-weight:800;letter-spacing:-0.3px}
.logo span{color:var(--accent)}
.otc-pill{font-size:10px;font-family:var(--mono);padding:3px 10px;border-radius:12px;
  background:rgba(255,140,0,0.1);border:1px solid var(--border2);color:var(--accent);letter-spacing:1px}
.sp{flex:1}
.utc{font-family:var(--mono);font-size:12px;color:var(--cyan)}
.conn{display:flex;align-items:center;gap:5px;font-size:11px;font-family:var(--mono);
  padding:3px 10px;border-radius:12px;border:1px solid}
.conn.live{background:rgba(0,230,118,0.07);border-color:rgba(0,230,118,0.25);color:var(--buy)}
.conn.off{background:rgba(255,63,90,0.07);border-color:rgba(255,63,90,0.25);color:var(--sell)}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.conn.live .dot{animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.back{padding:5px 12px;background:transparent;border:1px solid var(--border2);
  border-radius:7px;color:var(--text);font-size:11px;font-weight:700;
  text-decoration:none;font-family:var(--font)}
.back:hover{background:rgba(255,140,0,0.08)}
.lgout{padding:5px 12px;background:transparent;border:1px solid var(--border);
  border-radius:7px;color:var(--muted);font-size:11px;cursor:pointer;font-family:var(--font)}

/* TOP BAR */
.topbar{position:relative;z-index:1;
  padding:8px 20px;background:rgba(8,13,26,0.9);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.src-badge{display:flex;align-items:center;gap:6px;font-size:10px;font-family:var(--mono);
  padding:3px 10px;border-radius:12px;background:rgba(255,140,0,0.07);
  border:1px solid var(--border);color:var(--accent)}
.src-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:pulse 1s infinite}
.timer-wrap{display:flex;align-items:center;gap:10px;flex:1;max-width:400px}
.timer-lbl{font-size:10px;font-family:var(--mono);color:var(--muted);white-space:nowrap}
.tbar{flex:1;height:4px;background:var(--muted2);border-radius:2px;overflow:hidden}
.tfill{height:100%;border-radius:2px;transition:width 0.9s linear;background:var(--accent)}
.tfill.warn{background:var(--sell)}
.tsecs{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--accent);min-width:32px}
.tsecs.warn{color:var(--sell);animation:blink 0.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}

/* ═══ FINAL SIGNAL BANNER ═══ */
.final-wrap{
  position:fixed;bottom:0;left:0;right:0;z-index:999;
  transform:translateY(100%);transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1)}
.final-wrap.show{transform:translateY(0)}
.final-inner{
  padding:14px 24px;display:flex;align-items:center;gap:16px;
  border-top:2px solid rgba(255,255,255,0.2)}
.final-wrap.buy .final-inner{background:linear-gradient(90deg,#00c853,#00e676)}
.final-wrap.sell .final-inner{background:linear-gradient(90deg,#c62828,#ff3f5a)}
.final-wrap.wait .final-inner{background:rgba(20,30,50,0.97);border-top-color:var(--border)}
.final-icon{font-size:32px;line-height:1}
.final-main{flex:1}
.final-dir{font-size:24px;font-weight:800;letter-spacing:1px;line-height:1}
.final-wrap.buy .final-dir{color:#000}
.final-wrap.sell .final-dir{color:#fff}
.final-wrap.wait .final-dir{color:var(--muted)}
.final-detail{font-size:11px;font-family:var(--mono);margin-top:3px;opacity:0.75}
.final-wrap.buy .final-detail{color:rgba(0,0,0,0.7)}
.final-wrap.sell .final-detail,.final-wrap.wait .final-detail{color:rgba(255,255,255,0.6)}
.final-pairs{display:flex;flex-wrap:wrap;gap:6px}
.fp{padding:5px 10px;border-radius:7px;font-size:11px;font-weight:800;
  background:rgba(0,0,0,0.2);color:#fff;font-family:var(--font)}
.final-dismiss{font-size:10px;font-family:var(--mono);color:rgba(255,255,255,0.5);
  cursor:pointer;padding:5px 10px;border:1px solid rgba(255,255,255,0.2);border-radius:5px;
  white-space:nowrap}

/* STATS */
.stats{position:relative;z-index:1;margin:12px 20px 0;padding:10px 16px;
  background:var(--panel);border:1px solid var(--border);border-radius:12px;
  display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.stat{display:flex;flex-direction:column;gap:1px}
.slbl{font-size:9px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.sval{font-size:18px;font-weight:800}
.sval.b{color:var(--buy)}.sval.s{color:var(--sell)}.sval.n{color:var(--text)}
.sdiv{width:1px;height:26px;background:var(--border)}
.note{margin-left:auto;font-size:10px;font-family:var(--mono);color:var(--muted);
  padding:3px 10px;border-radius:6px;background:rgba(255,140,0,0.05);border:1px solid var(--border)}

/* GRID */
.ghdr{position:relative;z-index:1;padding:12px 20px 6px;
  display:flex;align-items:center;justify-content:space-between}
.gtitle{font-size:10px;font-family:var(--mono);color:var(--muted);letter-spacing:1.5px;text-transform:uppercase}
.gupdated{font-size:10px;font-family:var(--mono);color:var(--muted)}
.grid{position:relative;z-index:1;padding:0 20px 110px;
  display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:1050px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:650px){.grid{grid-template-columns:1fr}}

/* CARD */
.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;
  padding:16px;position:relative;overflow:hidden;
  border-top:2px solid rgba(255,140,0,0.15);transition:border-color 0.3s,box-shadow 0.3s}
.card.buy{border-top-color:var(--buy);background:linear-gradient(160deg,rgba(0,230,118,0.05),var(--panel) 50%)}
.card.sell{border-top-color:var(--sell);background:linear-gradient(160deg,rgba(255,63,90,0.05),var(--panel) 50%)}
.card.confirmed-buy{border-color:rgba(0,230,118,0.45);box-shadow:0 0 18px rgba(0,230,118,0.1)}
.card.confirmed-sell{border-color:rgba(255,63,90,0.45);box-shadow:0 0 18px rgba(255,63,90,0.1)}

.crow{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.pname{font-size:18px;font-weight:800;letter-spacing:-0.3px}
.ptags{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap}
.otag{font-size:8px;font-family:var(--mono);padding:2px 6px;border-radius:3px;
  background:rgba(255,140,0,0.08);color:var(--accent);border:1px solid rgba(255,140,0,0.25);letter-spacing:1px}
.ctag{font-size:8px;font-family:var(--mono);padding:2px 6px;border-radius:3px;
  background:rgba(168,85,247,0.08);color:var(--purple);border:1px solid rgba(168,85,247,0.25);letter-spacing:1px}
.conf-tag{font-size:8px;font-family:var(--mono);padding:2px 7px;border-radius:3px;letter-spacing:1px}
.conf-tag.ok{background:rgba(255,208,96,0.1);color:var(--gold);border:1px solid rgba(255,208,96,0.3)}
.conf-tag.raw{background:rgba(74,90,128,0.08);color:var(--muted);border:1px solid rgba(74,90,128,0.2)}
.slope-tag{font-size:8px;font-family:var(--mono);padding:2px 7px;border-radius:3px;letter-spacing:1px}
.slope-tag.up{background:rgba(0,230,118,0.08);color:var(--buy);border:1px solid rgba(0,230,118,0.2)}
.slope-tag.dn{background:rgba(255,63,90,0.08);color:var(--sell);border:1px solid rgba(255,63,90,0.2)}
.slope-tag.flat{background:rgba(74,90,128,0.08);color:var(--muted);border:1px solid rgba(74,90,128,0.2)}

.sigbtn{padding:8px 14px;border-radius:9px;font-family:var(--font);
  font-size:13px;font-weight:800;letter-spacing:1px;border:none;cursor:default}
.sigbtn.buy{background:linear-gradient(135deg,var(--buy),#00b359);color:#000;
  box-shadow:0 4px 14px rgba(0,230,118,0.3)}
.sigbtn.sell{background:linear-gradient(135deg,var(--sell),#cc0033);color:#fff;
  box-shadow:0 4px 14px rgba(255,63,90,0.3)}
.sigbtn.wait{background:rgba(58,74,106,0.2);color:var(--muted);
  border:1px solid rgba(58,74,106,0.3);font-size:11px}

/* SLOPE BAR — shows momentum direction visually */
.slope-bar-wrap{margin-bottom:8px}
.slope-bar-lbl{display:flex;justify-content:space-between;margin-bottom:3px}
.slope-bar-name{font-size:9px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.slope-bar-val{font-size:9px;font-family:var(--mono)}
.slope-track{height:5px;background:var(--muted2);border-radius:3px;overflow:hidden;position:relative}
.slope-fill{height:100%;border-radius:3px;position:absolute;transition:all 0.5s ease}
.slope-fill.up{background:linear-gradient(90deg,var(--muted2),var(--buy));right:0}
.slope-fill.dn{background:linear-gradient(90deg,var(--sell),var(--muted2));left:0}
.slope-fill.flat{background:var(--muted2);left:50%;width:2px}
.slope-center{position:absolute;left:50%;top:0;width:1px;height:100%;background:rgba(255,255,255,0.15)}

.confrow{margin-bottom:10px}
.conflbl{display:flex;justify-content:space-between;margin-bottom:4px}
.confname{font-size:9px;font-family:var(--mono);color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.confpct{font-size:11px;font-family:var(--mono);font-weight:700}
.confpct.hi{color:var(--buy)}.confpct.md{color:var(--gold)}.confpct.lo{color:var(--muted)}
.conftrack{height:4px;background:var(--muted2);border-radius:2px;overflow:hidden}
.conffill{height:100%;border-radius:2px;transition:width 0.4s ease}
.conffill.buy{background:linear-gradient(90deg,#00b359,var(--buy))}
.conffill.sell{background:linear-gradient(90deg,#cc0033,var(--sell))}
.conffill.wait{background:var(--muted2)}

.inds{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:8px}
.ind{background:var(--panel2);border:1px solid var(--border);border-radius:7px;padding:6px 5px;text-align:center}
.indn{font-size:8px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px}
.indv{font-size:11px;font-family:var(--mono);font-weight:700}
.indv.up,.indv.bullish{color:var(--buy)}.indv.dn,.indv.bearish{color:var(--sell)}.indv.neutral{color:var(--muted)}

.hist-row{display:flex;align-items:center;gap:4px;margin-bottom:7px}
.hist-lbl{font-size:9px;font-family:var(--mono);color:var(--muted);margin-right:2px}
.hdot{width:10px;height:10px;border-radius:50%;border:1px solid}
.hdot.buy{background:rgba(0,230,118,0.3);border-color:var(--buy)}
.hdot.sell{background:rgba(255,63,90,0.3);border-color:var(--sell)}
.hdot.wait{background:rgba(58,74,106,0.15);border-color:var(--muted)}

.tags{display:flex;flex-wrap:wrap;gap:4px;min-height:16px}
.tag{font-size:9px;font-family:var(--mono);padding:2px 6px;border-radius:4px;
  background:rgba(255,255,255,0.03);border:1px solid var(--border);color:var(--muted)}

.dqrow{display:flex;align-items:center;gap:6px;margin-top:7px;padding-top:7px;border-top:1px solid var(--border)}
.dqbar{flex:1;height:2px;background:var(--muted2);border-radius:1px;overflow:hidden}
.dqfill{height:100%;background:var(--accent);border-radius:1px}
.dqlbl{font-size:9px;font-family:var(--mono);color:var(--muted)}

.card.skel{animation:shimmer 1.5s ease infinite}
@keyframes shimmer{0%,100%{opacity:0.4}50%{opacity:0.8}}
.skline{height:12px;background:var(--muted2);border-radius:3px;margin-bottom:8px}
</style>
</head>
<body>
<header class="hdr">
  <div class="logo">RK<span>DXB</span> Trader</div>
  <div class="otc-pill">⚡ OTC SIGNALS</div>
  <div class="sp"></div>
  <span class="utc" id="clk">--:--:--</span>
  <div class="conn off" id="conn"><div class="dot"></div><span id="connTxt">Connecting</span></div>
  <a href="qx.html" class="back" style="border-color:rgba(99,102,241,0.35);color:#818cf8">📊 QX</a>
  <a href="dashboard.html" class="back">← Real Market</a>
  <button class="lgout" onclick="logout()">Logout</button>
</header>

<div class="topbar">
  <div class="src-badge"><div class="src-dot"></div>po-static.com LIVE</div>
  <div class="timer-wrap">
    <span class="timer-lbl">NEXT CANDLE</span>
    <div class="tbar"><div class="tfill" id="tfill" style="width:50%"></div></div>
    <span class="tsecs" id="tsecs">--s</span>
  </div>
  <span style="font-size:10px;font-family:var(--mono);color:var(--muted);margin-left:auto">12 OTC pairs · Confirmed 3× · No flip-flop</span>
</div>

<div class="stats">
  <div class="stat"><div class="slbl">BUY</div><div class="sval b" id="sB">—</div></div>
  <div class="sdiv"></div>
  <div class="stat"><div class="slbl">SELL</div><div class="sval s" id="sS">—</div></div>
  <div class="sdiv"></div>
  <div class="stat"><div class="slbl">WAIT</div><div class="sval n" id="sW">—</div></div>
  <div class="sdiv"></div>
  <div class="stat"><div class="slbl">Best Confirmed</div><div class="sval n" id="sBest" style="font-size:13px">Building...</div></div>
  <div class="note">✅ Signal = 3× same in a row</div>
</div>

<div class="ghdr">
  <span class="gtitle">// OTC SIGNALS — POCKET OPTION · 12 PAIRS</span>
  <span class="gupdated" id="upd">—</span>
</div>
<div class="grid" id="grid"></div>

<!-- FINAL SIGNAL BANNER -->
<div class="final-wrap" id="finalWrap">
  <div class="final-inner">
    <div class="final-icon" id="fIcon">⚡</div>
    <div class="final-main">
      <div class="final-dir" id="fDir">—</div>
      <div class="final-detail" id="fDetail">—</div>
    </div>
    <div class="final-pairs" id="fPairs"></div>
    <span class="final-dismiss" onclick="dismissBanner()">✕</span>
  </div>
</div>

<script>
'use strict';
// ── Auth ────────────────────────────────────────────────────
const EMAIL = localStorage.getItem('rk_auth_email');
let TOKEN = localStorage.getItem('rk_auth_token');
if (!EMAIL || !TOKEN) { location.href = 'index.html'; }

async function logout() {
  try {
    await fetch('https://rk-dxb-trader.onrender.com/api/auth/logout', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email:EMAIL})
    });
  } catch(e) {}
  localStorage.removeItem('rk_auth_email');
  localStorage.removeItem('rk_auth_token');
  location.href = 'index.html';
}

// ── State ────────────────────────────────────────────────────
let otcData = null;   // latest OTC state from server
let gridInit = false; // first render done?
let bannerDismissed = false;
let lastBannerSig = '';

// ── UTC Clock ────────────────────────────────────────────────
function pad(n){ return String(n).padStart(2,'0'); }
setInterval(() => {
  const n = new Date();
  document.getElementById('clk').textContent =
    `UTC ${pad(n.getUTCHours())}:${pad(n.getUTCMinutes())}:${pad(n.getUTCSeconds())}`;
}, 1000);

// ── Timer + Final Banner trigger ─────────────────────────────
setInterval(() => {
  const secs = 60 - new Date().getUTCSeconds();
  const pct  = (secs / 60) * 100;
  const fill = document.getElementById('tfill');
  const sel  = document.getElementById('tsecs');
  fill.style.width = pct + '%';
  sel.textContent  = secs + 's';
  const warn = secs <= 10;
  fill.className = 'tfill' + (warn ? ' warn' : '');
  sel.className  = 'tsecs' + (warn ? ' warn' : '');

  if (warn) {
    triggerFinalBanner(secs);
  } else {
    if (!bannerDismissed) hideBanner();
    bannerDismissed = false;
  }
}, 1000);

// ── Final Banner ─────────────────────────────────────────────
function triggerFinalBanner(secsLeft) {
  if (!otcData) return;
  const pairs = otcData.pairs;

  // ── THE ALGORITHM: How we decide final signal ────────────
  // Priority 1: CONFIRMED signals (3× same in a row) → most reliable
  // Priority 2: Strong slope (linear regression) aligning with signal
  // Priority 3: Majority direction if multiple pairs agree
  // ONLY show banner if we have strong conviction

  const confirmed = pairs.filter(p => p.isConfirmed && p.signal !== 'WAIT' && p.confidence >= 65);
  
  // Score each confirmed signal with slope alignment bonus
  const scored = confirmed.map(p => {
    let score = p.confidence;
    // Slope aligns with signal = +15 bonus
    if ((p.signal === 'BUY'  && p.slopeDir === 'UP')   ||
        (p.signal === 'SELL' && p.slopeDir === 'DOWN')) {
      score += 15;
    }
    // Strong slope = +10 bonus
    if (p.slopeStrong) score += 10;
    return { ...p, score };
  });

  if (scored.length === 0) return; // No confirmed signal — no banner

  // Find dominant direction
  const buys  = scored.filter(p => p.signal === 'BUY');
  const sells = scored.filter(p => p.signal === 'SELL');
  
  // Need at least 1 confirmed pair
  const dominant = buys.length >= sells.length ? 'BUY' : 'SELL';
  const domPairs = (dominant === 'BUY' ? buys : sells)
    .sort((a,b) => b.score - a.score);

  if (domPairs.length === 0) return;

  const best  = domPairs[0];
  const sigKey = dominant + '-' + secsLeft;
  if (sigKey === lastBannerSig) return; // Don't re-show same second
  lastBannerSig = sigKey;

  // Show banner
  const wrap = document.getElementById('finalWrap');
  wrap.className = 'final-wrap show ' + dominant.toLowerCase();
  
  document.getElementById('fIcon').textContent = dominant === 'BUY' ? '▲' : '▼';
  document.getElementById('fDir').textContent  = dominant === 'BUY' ? 'GO UP — CALL' : 'GO DOWN — PUT';
  document.getElementById('fDetail').textContent =
    `${secsLeft}s left · ${domPairs.length} confirmed · Best: ${best.displayName.replace(' OTC','')} ${best.score}pts`;

  document.getElementById('fPairs').innerHTML = domPairs.slice(0, 4).map(p =>
    `<div class="fp">${p.displayName.replace(' OTC','')}<br><small style="opacity:0.7">${p.signal} ${p.confidence}%</small></div>`
  ).join('');
}

function hideBanner() {
  document.getElementById('finalWrap').className = 'final-wrap';
}
function dismissBanner() {
  bannerDismissed = true;
  hideBanner();
}

// ── Helpers ──────────────────────────────────────────────────
function iClass(v, t) {
  if (v === null || v === undefined) return 'neutral';
  if (t === 'macd' || t === 'ema') {
    if (typeof v === 'string')
      return (v === 'UP' || v.includes('bull')) ? 'bullish' :
             (v === 'DN' || v.includes('bear')) ? 'bearish' : 'neutral';
    return 'neutral';
  }
  if (t === 'rsi')   return v >= 65 ? 'dn' : v <= 35 ? 'up' : 'neutral';
  if (t === 'stoch') return v >= 80 ? 'dn' : v <= 20 ? 'up' : 'neutral';
  if (t === 'wr')    return v >= -20 ? 'dn' : v <= -80 ? 'up' : 'neutral';
  return 'neutral';
}
function iV(v) { return (v === null || v === undefined) ? '—' : String(v); }
function pC(c) { return c >= 80 ? 'hi' : c >= 65 ? 'md' : 'lo'; }

function slopeBar(slope, slopeDir) {
  // Slope range -5 to +5 mapped to 0-100%
  const pct = Math.min(50, Math.abs(parseFloat(slope||0)) * 10);
  const col  = slopeDir === 'UP' ? 'up' : slopeDir === 'DOWN' ? 'dn' : 'flat';
  const style = slopeDir === 'UP'
    ? `right:0;width:${pct}%`
    : slopeDir === 'DOWN'
    ? `left:0;width:${pct}%`
    : 'left:50%;width:2px';
  return `<div class="slope-bar-wrap">
    <div class="slope-bar-lbl">
      <span class="slope-bar-name">MOMENTUM SLOPE</span>
      <span class="slope-bar-val" style="color:var(--${slopeDir==='UP'?'buy':slopeDir==='DOWN'?'sell':'muted'})">${slopeDir} (${(slope||0).toFixed ? (slope||0).toFixed(2) : slope})</span>
    </div>
    <div class="slope-track">
      <div class="slope-fill ${col}" style="${style}"></div>
      <div class="slope-center"></div>
    </div>
  </div>`;
}

// ── Render one card ──────────────────────────────────────────
function renderCard(p) {
  const sig   = p.signal.toLowerCase();
  const isConf = p.isConfirmed && p.signal !== 'WAIT';
  const dq    = Math.min(100, Math.round((p.candleCount / 20) * 100));
  const short = p.displayName.replace(' OTC','');
  const hist  = (p.signalHistory || []).slice(-5);
  const sDir  = (p.slopeDir || 'FLAT').toLowerCase() === 'up' ? 'up' :
                (p.slopeDir || 'FLAT').toLowerCase() === 'down' ? 'dn' : 'flat';
  const slopeLabel = sDir === 'up' ? '↑ UP' : sDir === 'dn' ? '↓ DOWN' : '→ FLAT';

  return `<div class="card ${sig}${isConf?' confirmed-'+sig:''}" id="c-${p.symbol}">
    <div class="crow">
      <div>
        <div class="pname">${short}</div>
        <div class="ptags">
          ${p.isCrypto ? '<span class="ctag">⚡ CRYPTO</span>' : '<span class="otag">OTC</span>'}
          <span class="conf-tag ${isConf?'ok':'raw'}">${isConf?'✓ CONFIRMED':'BUILDING'}</span>
          <span class="slope-tag ${sDir}">${slopeLabel}</span>
        </div>
      </div>
      <div class="sigbtn ${sig}">
        ${sig==='buy'?'▲ BUY':sig==='sell'?'▼ SELL':'⏸ WAIT'}
      </div>
    </div>

    ${slopeBar(p.slope, p.slopeDir || 'FLAT')}

    <div class="confrow">
      <div class="conflbl">
        <span class="confname">CONFIDENCE</span>
        <span class="confpct ${pC(p.confidence)}">${p.confidence}%</span>
      </div>
      <div class="conftrack">
        <div class="conffill ${sig}" style="width:${p.confidence}%"></div>
      </div>
    </div>

    <div class="inds">
      <div class="ind"><div class="indn">RSI</div><div class="indv ${iClass(p.rsi,'rsi')}">${iV(p.rsi)}</div></div>
      <div class="ind"><div class="indn">STOCH</div><div class="indv ${iClass(p.stoch,'stoch')}">${iV(p.stoch)}</div></div>
      <div class="ind"><div class="indn">MACD</div><div class="indv ${iClass(p.macd,'macd')}">${iV(p.macd)}</div></div>
      <div class="ind"><div class="indn">EMA</div><div class="indv ${iClass(p.emaTrend,'ema')}">${iV(p.emaTrend)}</div></div>
    </div>

    <div class="hist-row">
      <span class="hist-lbl">LAST 5:</span>
      ${hist.map(s=>`<div class="hdot ${s.toLowerCase()}"></div>`).join('')}
      ${p.rawSignal&&p.rawSignal!==p.signal?`<span style="font-size:9px;font-family:var(--mono);color:var(--muted);margin-left:4px">now:${p.rawSignal}</span>`:''}
    </div>

    <div class="tags">
      ${(p.reasons||[]).slice(0,3).map(r=>`<span class="tag">${r}</span>`).join('')}
      ${p.pattern&&p.pattern!=='none'?`<span class="tag" style="color:var(--gold);border-color:rgba(255,208,96,0.2)">${p.pattern}</span>`:''}
    </div>

    <div class="dqrow">
      <div class="dqlbl">${p.candleCount}c</div>
      <div class="dqbar"><div class="dqfill" style="width:${dq}%"></div></div>
      <div class="dqlbl">${dq<100?'Building...':'Ready ✓'}</div>
    </div>
  </div>`;
}

// ── Render state ─────────────────────────────────────────────
function renderOTCState(state) {
  if (!state || !state.pairs) return;
  otcData = state;

  const pairs = state.pairs;
  const grid  = document.getElementById('grid');

  if (!gridInit) {
    grid.innerHTML = pairs.map(renderCard).join('');
    gridInit = true;
  } else {
    pairs.forEach(p => {
      const el = document.getElementById('c-' + p.symbol);
      if (el) {
        const tmp = document.createElement('div');
        tmp.innerHTML = renderCard(p);
        el.replaceWith(tmp.firstElementChild);
      }
    });
  }

  // Stats
  const buys  = pairs.filter(p => p.signal === 'BUY').length;
  const sells = pairs.filter(p => p.signal === 'SELL').length;
  document.getElementById('sB').textContent = buys;
  document.getElementById('sS').textContent = sells;
  document.getElementById('sW').textContent = pairs.filter(p => p.signal === 'WAIT').length;

  const best = pairs
    .filter(p => p.signal !== 'WAIT' && p.isConfirmed)
    .sort((a,b) => b.confidence - a.confidence)[0]
    || pairs.filter(p => p.signal !== 'WAIT').sort((a,b) => b.confidence - a.confidence)[0];

  const bestEl = document.getElementById('sBest');
  if (best) {
    bestEl.textContent = `${best.displayName.replace(' OTC','')} ${best.signal} ${best.confidence}%${best.isConfirmed?' ✓':''}`;
    bestEl.style.color = best.signal === 'BUY' ? 'var(--buy)' : 'var(--sell)';
  } else {
    bestEl.textContent = 'Building candles...';
    bestEl.style.color = 'var(--text)';
  }

  const t = new Date(state.serverTime);
  document.getElementById('upd').textContent =
    `Updated ${pad(t.getUTCHours())}:${pad(t.getUTCMinutes())}:${pad(t.getUTCSeconds())} UTC`;
}

// ── WebSocket ────────────────────────────────────────────────
const WSU = location.hostname === 'localhost'
  ? 'ws://localhost:3001'
  : 'wss://rk-dxb-trader.onrender.com';

let ws, reconnTimer;

function setConn(cls, txt) {
  document.getElementById('conn').className = 'conn ' + cls;
  document.getElementById('connTxt').textContent = txt;
}

function connect() {
  setConn('off', 'Connecting');
  ws = new WebSocket(WSU);

  ws.onopen = () => {
    clearTimeout(reconnTimer);
    ws.send(JSON.stringify({ type: 'auth', email: EMAIL, token: TOKEN }));
  };

  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'auth_ok') {
        setConn('live', 'Live');
        return;
      }
      if (msg.type === 'token_refresh') {
        // Server restarted — silently accept new token, no disruption
        TOKEN = msg.token;
        localStorage.setItem('rk_auth_token', TOKEN);
        return;
      }
      if (msg.type === 'kicked') {
        alert('⚠️ Another device logged in. Session ended.');
        localStorage.removeItem('rk_auth_email');
        localStorage.removeItem('rk_auth_token');
        location.href = 'index.html';
        return;
      }
      if (msg.type === 'auth_failed') {
        // Email not authorized — redirect to login
        localStorage.removeItem('rk_auth_email');
        localStorage.removeItem('rk_auth_token');
        location.href = 'index.html';
        return;
      }
      // Handle OTC state updates
      if (msg.type === 'otc') {
        renderOTCState(msg);
      }
      // Ignore type:'state' (forex) messages — this is the OTC page
    } catch(err) { /* ignore parse errors */ }
  };

  ws.onclose = () => {
    setConn('off', 'Reconnecting');
    reconnTimer = setTimeout(connect, 4000);
  };
  ws.onerror = () => ws.close();
}

// ── REST fallback — only if WS not connected ─────────────────
// Polls every 4s but ONLY when WebSocket is NOT live
// This prevents double-rendering and flickering
function restPoll() {
  if (ws && ws.readyState === WebSocket.OPEN) return; // WS is live, skip
  fetch('https://rk-dxb-trader.onrender.com/api/otc')
    .then(r => {
      if (!r.ok) throw new Error('not ok');
      return r.json();
    })
    .then(data => { if (data && data.pairs) renderOTCState(data); })
    .catch(() => {}); // Silent fail
}

// ── Init ─────────────────────────────────────────────────────
// Skeleton
document.getElementById('grid').innerHTML = [
  'EUR/USD','GBP/USD','USD/JPY','AUD/USD','USD/CAD','EUR/GBP',
  'GBP/JPY','EUR/JPY','USD/CHF','NZD/USD','BTC/USD','ETH/USD'
].map(n => `<div class="card skel">
  <div style="font-size:17px;font-weight:800;margin-bottom:10px">${n} OTC</div>
  <div class="skline" style="width:60%"></div>
  <div class="skline" style="width:100%;height:4px;margin:12px 0"></div>
  <div class="skline" style="width:80%"></div>
  <div class="skline" style="width:50%"></div>
</div>`).join('');

connect();

// Initial REST fetch after 1s
setTimeout(restPoll, 1000);
// REST fallback every 4s (only fires when WS is down)
setInterval(restPoll, 4000);
</script>
