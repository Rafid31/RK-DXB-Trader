<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RK DXB — Live Charts</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
:root {
  --bg:      #0a0e1a;
  --panel:   #0f1623;
  --card:    #111827;
  --border:  #1e2a3a;
  --text:    #e2e8f0;
  --muted:   #64748b;
  --green:   #00d084;
  --red:     #ff4757;
  --blue:    #3b82f6;
  --yellow:  #f59e0b;
  --mono: 'SF Mono','Fira Code','Consolas',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-size:13px;display:flex;flex-direction:column;
}

/* ── TOP NAV ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;height:44px;min-height:44px;
  background:var(--panel);border-bottom:1px solid var(--border);
  flex-shrink:0;z-index:10;
}
.logo{font-size:15px;font-weight:800;letter-spacing:1px;color:var(--green)}
.logo span{color:var(--text)}
.nav-links{display:flex;gap:2px;margin-left:16px}
.nav-links a{
  color:var(--muted);text-decoration:none;padding:5px 12px;
  border-radius:6px;font-size:12px;font-weight:500;transition:all .15s
}
.nav-links a:hover{color:var(--text);background:var(--border)}
.nav-links a.active{color:var(--green);background:rgba(0,208,132,0.1)}
.topbar-right{display:flex;align-items:center;gap:12px}
.live-badge{
  display:flex;align-items:center;gap:6px;
  font-size:11px;font-weight:600;color:var(--green);
}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.server-time{font-size:11px;color:var(--muted);font-family:var(--mono)}

/* ── MAIN LAYOUT ── */
.main{display:flex;flex:1;overflow:hidden}

/* ── PAIR SIDEBAR ── */
.sidebar{
  width:200px;min-width:200px;
  background:var(--panel);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.sidebar-title{
  padding:10px 12px 8px;font-size:10px;font-weight:700;
  letter-spacing:1px;color:var(--muted);text-transform:uppercase;
  border-bottom:1px solid var(--border);
}
.pair-list{flex:1;overflow-y:auto;padding:4px 0}
.pair-list::-webkit-scrollbar{width:4px}
.pair-list::-webkit-scrollbar-track{background:transparent}
.pair-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.pair-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;cursor:pointer;transition:background .1s;
  border-left:3px solid transparent;
}
.pair-item:hover{background:rgba(255,255,255,0.04)}
.pair-item.active{background:rgba(0,208,132,0.08);border-left-color:var(--green)}
.pair-item.sig-buy{border-left-color:var(--green)}
.pair-item.sig-sell{border-left-color:var(--red)}

.pi-left{display:flex;flex-direction:column;gap:2px}
.pi-sym{font-size:12px;font-weight:700;letter-spacing:.3px}
.pi-price{font-size:10px;font-family:var(--mono);color:var(--muted)}
.pi-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.pi-sig{
  font-size:9px;font-weight:800;padding:2px 6px;border-radius:4px;
  font-family:var(--mono);letter-spacing:.5px;
}
.pi-sig.buy{background:rgba(0,208,132,0.15);color:var(--green)}
.pi-sig.sell{background:rgba(255,71,87,0.15);color:var(--red)}
.pi-sig.wait{background:rgba(100,116,139,0.1);color:var(--muted)}
.pi-conf{font-size:9px;color:var(--muted);font-family:var(--mono)}

/* ── CHART AREA ── */
.chart-area{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* pair header */
.chart-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.ch-left{display:flex;align-items:center;gap:14px}
.ch-sym{font-size:20px;font-weight:900;letter-spacing:.5px}
.ch-type{
  font-size:9px;font-weight:700;padding:3px 8px;border-radius:5px;letter-spacing:1px;
  color:var(--blue);background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.25)
}
.ch-type.crypto{color:var(--yellow);background:rgba(245,158,11,0.1);border-color:rgba(245,158,11,0.25)}
.ch-price-block{display:flex;align-items:baseline;gap:8px}
.ch-price{font-size:22px;font-weight:800;font-family:var(--mono);transition:color .3s}
.ch-price.up{color:var(--green)}
.ch-price.dn{color:var(--red)}
.ch-change{font-size:12px;font-family:var(--mono)}
.ch-change.up{color:var(--green)}
.ch-change.dn{color:var(--red)}
.ch-change.flat{color:var(--muted)}

.ch-right{display:flex;align-items:center;gap:12px}
.signal-big{
  display:flex;align-items:center;gap:8px;
  padding:8px 18px;border-radius:10px;
  font-size:15px;font-weight:900;font-family:var(--mono);letter-spacing:1px;
  border:1.5px solid;transition:all .3s;
}
.signal-big.buy{
  background:rgba(0,208,132,0.12);color:var(--green);border-color:rgba(0,208,132,0.4)
}
.signal-big.sell{
  background:rgba(255,71,87,0.12);color:var(--red);border-color:rgba(255,71,87,0.4)
}
.signal-big.wait{
  background:rgba(100,116,139,0.08);color:var(--muted);border-color:var(--border)
}
.signal-arrow-big{font-size:18px}

.conf-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.conf-label-big{font-size:10px;color:var(--muted);font-family:var(--mono)}
.conf-bar-big{width:100px;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.conf-fill-big{height:100%;border-radius:3px;transition:width .4s}
.conf-fill-big.buy{background:var(--green)}
.conf-fill-big.sell{background:var(--red)}
.conf-fill-big.wait{background:var(--muted)}

/* chart canvas wrapper */
.chart-canvas-wrap{
  flex:1;background:#080d16;
  position:relative;overflow:hidden;
}
#mainChart{width:100%;height:100%}

/* reasons bar */
.reasons-bar{
  padding:8px 16px;background:var(--panel);border-top:1px solid var(--border);
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0;
  min-height:36px;
}
.reason-chip{
  font-size:10px;padding:3px 9px;border-radius:5px;
  background:rgba(255,255,255,0.05);color:var(--muted);border:1px solid var(--border);
  font-family:var(--mono);
}
.reason-chip.buy{background:rgba(0,208,132,0.08);color:var(--green);border-color:rgba(0,208,132,0.2)}
.reason-chip.sell{background:rgba(255,71,87,0.08);color:var(--red);border-color:rgba(255,71,87,0.2)}

/* bottom countdown */
.countdown-strip{
  display:flex;align-items:center;gap:10px;
  padding:5px 16px;background:var(--panel);border-top:1px solid var(--border);
  flex-shrink:0;font-size:11px;color:var(--muted);
}
.countdown-bar{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.countdown-fill{height:100%;background:var(--green);border-radius:2px;transition:width 1s linear}

/* OHLC info overlay */
.ohlc-bar{
  position:absolute;top:8px;left:12px;
  display:flex;gap:14px;font-size:11px;font-family:var(--mono);
  pointer-events:none;z-index:5;
  background:rgba(8,13,22,0.7);padding:4px 10px;border-radius:6px;
}
.ohlc-item{display:flex;gap:4px}
.ohlc-key{color:var(--muted)}
.ohlc-val{color:var(--text);font-weight:600}
.ohlc-val.up{color:var(--green)}
.ohlc-val.dn{color:var(--red)}

/* RSI / indicator strip */
.indicator-strip{
  display:flex;align-items:center;gap:12px;
  padding:4px 16px;background:var(--panel);border-top:1px solid var(--border);
  flex-shrink:0;font-size:10px;font-family:var(--mono);
}
.ind-item{display:flex;align-items:center;gap:5px}
.ind-key{color:var(--muted)}
.ind-val{font-weight:700}
.ind-val.bull{color:var(--green)}
.ind-val.bear{color:var(--red)}
.ind-val.neut{color:var(--yellow)}

/* mobile */
@media(max-width:700px){
  .sidebar{width:130px;min-width:130px}
  .pi-price{display:none}
  .ch-price{font-size:16px}
  .ch-sym{font-size:16px}
  .signal-big{font-size:12px;padding:6px 12px}
}
</style>
</head>
<body>

<!-- NAV -->
<div class="topbar">
  <div style="display:flex;align-items:center">
    <div class="logo">RK <span>DXB</span></div>
    <nav class="nav-links">
      <a href="/dashboard.html">Dashboard</a>
      <a href="/qx.html">QX</a>
      <a href="/otc.html">OTC</a>
      <a href="/chart.html" class="active">📈 Live Charts</a>
    </nav>
  </div>
  <div class="topbar-right">
    <div class="live-badge"><span class="dot"></span>LIVE</div>
    <div class="server-time" id="serverTime">—</div>
  </div>
</div>

<div class="main">

  <!-- PAIR SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-title">All Pairs</div>
    <div class="pair-list" id="pairList">
      <!-- injected -->
    </div>
  </div>

  <!-- CHART AREA -->
  <div class="chart-area">

    <!-- chart header -->
    <div class="chart-header">
      <div class="ch-left">
        <span class="ch-sym" id="chSym">EUR/USD</span>
        <span class="ch-type" id="chType">FOREX</span>
      </div>
      <div class="ch-price-block">
        <span class="ch-price" id="chPrice">—</span>
        <span class="ch-change flat" id="chChange">—</span>
      </div>
      <div class="ch-right">
        <div class="signal-big wait" id="signalBig">
          <span class="signal-arrow-big" id="signalArrow">—</span>
          <span id="signalLabel">WAIT</span>
        </div>
        <div class="conf-wrap">
          <div class="conf-label-big" id="confLabel">Confidence: 0%</div>
          <div class="conf-bar-big">
            <div class="conf-fill-big wait" id="confFill" style="width:0%"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- chart canvas -->
    <div class="chart-canvas-wrap">
      <div id="mainChart"></div>
      <div class="ohlc-bar" id="ohlcBar" style="display:none">
        <div class="ohlc-item"><span class="ohlc-key">O</span><span class="ohlc-val" id="oO">—</span></div>
        <div class="ohlc-item"><span class="ohlc-key">H</span><span class="ohlc-val up" id="oH">—</span></div>
        <div class="ohlc-item"><span class="ohlc-key">L</span><span class="ohlc-val dn" id="oL">—</span></div>
        <div class="ohlc-item"><span class="ohlc-key">C</span><span class="ohlc-val" id="oC">—</span></div>
      </div>
    </div>

    <!-- indicator strip -->
    <div class="indicator-strip" id="indicatorStrip">
      <div class="ind-item"><span class="ind-key">RSI</span><span class="ind-val neut" id="indRsi">—</span></div>
      <div class="ind-item"><span class="ind-key">EMA</span><span class="ind-val neut" id="indEma">—</span></div>
      <div class="ind-item"><span class="ind-key">1M Candles</span><span class="ind-val neut" id="indCandles">—</span></div>
      <div class="ind-item" style="margin-left:auto"><span class="ind-key">Updated</span><span class="ind-val neut" id="indUpdated">—</span></div>
    </div>

    <!-- reasons -->
    <div class="reasons-bar" id="reasonsBar">
      <span style="color:var(--muted);font-size:11px">Loading signal reasons…</span>
    </div>

    <!-- countdown -->
    <div class="countdown-strip">
      <span>Next update:</span>
      <div class="countdown-bar"><div class="countdown-fill" id="countdownFill" style="width:100%"></div></div>
      <span id="countdownSec">60s</span>
    </div>

  </div><!-- end chart-area -->
</div><!-- end main -->

<script>
/* ─────────────────────────────────────────
   CONFIG
───────────────────────────────────────── */
const API  = 'https://rk-dxb-trader.onrender.com';
const REFRESH_S = 60;

/* ─── STATE ─── */
let allData      = [];       // full /api/candles response pairs array
let activeSym    = 'EUR/USD';
let chart        = null;
let candleSeries = null;
let countdownV   = REFRESH_S;
let countdownT   = null;

/* ─────────────────────────────────────────
   HELPERS
───────────────────────────────────────── */
function fmtPrice(v, sym) {
  if (v == null) return '—';
  if (sym && sym.includes('JPY'))             return Number(v).toFixed(3);
  if (sym && (sym.includes('BTC')||sym.includes('ETH'))) return Number(v).toFixed(2);
  return Number(v).toFixed(5);
}

function priceChange(cur, prev, sym) {
  if (!cur || !prev) return { label: '—', cls: 'flat' };
  const d   = cur - prev;
  const pct = (d / prev) * 100;
  const sgn = d >= 0 ? '+' : '';
  let label;
  if (sym && (sym.includes('BTC')||sym.includes('ETH')))
    label = sgn + d.toFixed(2) + '  (' + sgn + pct.toFixed(2) + '%)';
  else
    label = sgn + d.toFixed(5) + '  (' + sgn + pct.toFixed(3) + '%)';
  return { label, cls: d > 0 ? 'up' : d < 0 ? 'dn' : 'flat' };
}

function candleTime(raw) {
  if (typeof raw === 'number') return raw;
  return Math.floor(new Date(String(raw).replace(' ', 'T') + 'Z').getTime() / 1000);
}

/* ─────────────────────────────────────────
   BUILD / INIT CHART  (called once)
───────────────────────────────────────── */
function initChart() {
  const el = document.getElementById('mainChart');
  chart = LightweightCharts.createChart(el, {
    width:  el.clientWidth,
    height: el.clientHeight,
    layout: {
      background: { type: 'solid', color: '#080d16' },
      textColor: '#64748b',
      fontSize: 11,
    },
    grid: {
      vertLines: { color: '#0f1a2b', style: 1 },
      horzLines: { color: '#0f1a2b', style: 1 },
    },
    crosshair: {
      mode: LightweightCharts.CrosshairMode.Normal,
      vertLine: { color: '#334155', width: 1, style: 2, labelBackgroundColor: '#1e2a3a' },
      horzLine: { color: '#334155', width: 1, style: 2, labelBackgroundColor: '#1e2a3a' },
    },
    rightPriceScale: {
      borderColor: '#1e2a3a',
      textColor: '#64748b',
      scaleMargins: { top: 0.08, bottom: 0.08 },
    },
    timeScale: {
      borderColor: '#1e2a3a',
      timeVisible: true,
      secondsVisible: false,
      rightOffset: 5,
      barSpacing: 10,
      minBarSpacing: 4,
    },
    handleScroll: { mouseWheel: true, pressedMouseMove: true, horzTouchDrag: true },
    handleScale:  { axisPressedMouseMove: true, mouseWheel: true, pinch: true },
  });

  candleSeries = chart.addCandlestickSeries({
    upColor:         '#00d084',
    downColor:       '#ff4757',
    borderUpColor:   '#00d084',
    borderDownColor: '#ff4757',
    wickUpColor:     '#00d084',
    wickDownColor:   '#ff4757',
    borderVisible:   true,
  });

  // OHLC tooltip on crosshair move
  chart.subscribeCrosshairMove(param => {
    const bar = document.getElementById('ohlcBar');
    if (!param || !param.seriesData) { bar.style.display = 'none'; return; }
    const d = param.seriesData.get(candleSeries);
    if (!d) { bar.style.display = 'none'; return; }
    bar.style.display = 'flex';
    document.getElementById('oO').textContent = fmtPrice(d.open, activeSym);
    document.getElementById('oH').textContent = fmtPrice(d.high, activeSym);
    document.getElementById('oL').textContent = fmtPrice(d.low,  activeSym);
    const cc = document.getElementById('oC');
    cc.textContent = fmtPrice(d.close, activeSym);
    cc.className = 'ohlc-val ' + (d.close >= d.open ? 'up' : 'dn');
  });

  // Responsive
  const ro = new ResizeObserver(() => {
    if (el && el.clientWidth > 0)
      chart.applyOptions({ width: el.clientWidth, height: el.clientHeight });
  });
  ro.observe(el);
}

/* ─────────────────────────────────────────
   LOAD PAIR INTO CHART
───────────────────────────────────────── */
function loadPair(sym) {
  activeSym = sym;
  const pair = allData.find(p => p.symbol === sym);
  if (!pair) return;

  /* ── header ── */
  document.getElementById('chSym').textContent = sym;
  const typeEl = document.getElementById('chType');
  typeEl.textContent  = (pair.type || 'forex').toUpperCase();
  typeEl.className    = 'ch-type ' + (pair.type === 'crypto' ? 'crypto' : '');

  const priceEl  = document.getElementById('chPrice');
  const changeEl = document.getElementById('chChange');
  const chg      = priceChange(pair.price, pair.prevPrice, sym);
  priceEl.textContent  = fmtPrice(pair.price, sym);
  priceEl.className    = 'ch-price ' + chg.cls;
  changeEl.textContent = chg.label;
  changeEl.className   = 'ch-change ' + chg.cls;

  /* ── signal badge ── */
  const sig    = (pair.signal || 'WAIT').toLowerCase();
  const sigEl  = document.getElementById('signalBig');
  const arrEl  = document.getElementById('signalArrow');
  const labEl  = document.getElementById('signalLabel');
  sigEl.className = 'signal-big ' + sig;
  arrEl.textContent = sig === 'buy' ? '▲' : sig === 'sell' ? '▼' : '—';
  labEl.textContent = sig === 'buy' ? 'BUY' : sig === 'sell' ? 'SELL' : 'WAIT';

  const conf = Math.min(pair.confidence || 0, 100);
  document.getElementById('confLabel').textContent = 'Confidence: ' + conf + '%';
  const confFill = document.getElementById('confFill');
  confFill.style.width = conf + '%';
  confFill.className = 'conf-fill-big ' + sig;

  /* ── indicators ── */
  const rsi = pair.rsi ? Math.round(pair.rsi) : null;
  const rsiEl = document.getElementById('indRsi');
  if (rsi) {
    rsiEl.textContent = rsi;
    rsiEl.className   = 'ind-val ' + (rsi >= 70 ? 'bear' : rsi <= 30 ? 'bull' : 'neut');
  } else {
    rsiEl.textContent = '—'; rsiEl.className = 'ind-val neut';
  }
  const emaEl = document.getElementById('indEma');
  if (pair.emaTrend) {
    emaEl.textContent = pair.emaTrend;
    emaEl.className   = 'ind-val ' + (pair.emaTrend === 'UP' ? 'bull' : pair.emaTrend === 'DOWN' ? 'bear' : 'neut');
  } else {
    emaEl.textContent = '—'; emaEl.className = 'ind-val neut';
  }
  document.getElementById('indCandles').textContent = (pair.candles || []).length;
  if (pair.updatedAt) {
    const d = new Date(pair.updatedAt);
    document.getElementById('indUpdated').textContent =
      d.toLocaleTimeString('en-GB', { hour12: false });
  }

  /* ── reasons ── */
  const rb = document.getElementById('reasonsBar');
  const reasons = pair.reasons || [];
  if (reasons.length === 0) {
    rb.innerHTML = '<span style="color:var(--muted);font-size:11px">No signal reasons — market may be closed or insufficient data</span>';
  } else {
    rb.innerHTML = reasons.map(r =>
      `<span class="reason-chip ${sig}">${r}</span>`
    ).join('');
  }

  /* ── candles ── */
  const raw = pair.candles || [];
  const cData = raw
    .map(c => ({
      time:  candleTime(c.time),
      open:  parseFloat(c.open),
      high:  parseFloat(c.high),
      low:   parseFloat(c.low),
      close: parseFloat(c.close),
    }))
    .filter(c => !isNaN(c.open) && c.time > 0)
    .sort((a, b) => a.time - b.time);

  // Deduplicate
  const seen = new Set();
  const unique = cData.filter(c => { if (seen.has(c.time)) return false; seen.add(c.time); return true; });

  if (unique.length > 0) {
    candleSeries.setData(unique);

    // Add signal marker on the last bar
    if (sig === 'buy' || sig === 'sell') {
      const last = unique[unique.length - 1];
      candleSeries.setMarkers([{
        time:     last.time,
        position: sig === 'buy' ? 'belowBar' : 'aboveBar',
        color:    sig === 'buy' ? '#00d084' : '#ff4757',
        shape:    sig === 'buy' ? 'arrowUp' : 'arrowDown',
        text:     sig === 'buy' ? '▲ BUY' : '▼ SELL',
        size:     2,
      }]);
    } else {
      candleSeries.setMarkers([]);
    }

    // Show last 50 candles
    chart.timeScale().setVisibleLogicalRange({
      from: Math.max(0, unique.length - 52),
      to:   unique.length + 2,
    });
  }

  /* ── highlight active in sidebar ── */
  document.querySelectorAll('.pair-item').forEach(el => {
    el.classList.toggle('active', el.dataset.sym === sym);
  });
}

/* ─────────────────────────────────────────
   BUILD SIDEBAR
───────────────────────────────────────── */
function buildSidebar(pairs) {
  const list = document.getElementById('pairList');
  list.innerHTML = '';

  /* Sort: BUY/SELL first */
  const sorted = [...pairs].sort((a, b) => {
    const r = s => s === 'BUY' ? 0 : s === 'SELL' ? 1 : 2;
    return r(a.signal) - r(b.signal) || (b.confidence||0) - (a.confidence||0);
  });

  sorted.forEach(pair => {
    const sig   = (pair.signal || 'WAIT').toLowerCase();
    const item  = document.createElement('div');
    item.className = 'pair-item sig-' + sig + (pair.symbol === activeSym ? ' active' : '');
    item.dataset.sym = pair.symbol;

    const chg  = priceChange(pair.price, pair.prevPrice, pair.symbol);
    item.innerHTML = `
      <div class="pi-left">
        <span class="pi-sym">${pair.symbol}</span>
        <span class="pi-price">${fmtPrice(pair.price, pair.symbol)}</span>
      </div>
      <div class="pi-right">
        <span class="pi-sig ${sig}">${sig.toUpperCase()}</span>
        <span class="pi-conf">${pair.confidence || 0}%</span>
      </div>`;

    item.addEventListener('click', () => loadPair(pair.symbol));
    list.appendChild(item);
  });
}

/* ─────────────────────────────────────────
   FETCH DATA
───────────────────────────────────────── */
async function fetchData() {
  try {
    const res  = await fetch(API + '/api/candles?ts=' + Date.now());
    const data = await res.json();

    allData = data.pairs || [];

    // server time
    if (data.serverTime) {
      const t = new Date(data.serverTime);
      document.getElementById('serverTime').textContent =
        t.toLocaleTimeString('en-GB', { hour12: false }) + ' UTC';
    }

    buildSidebar(allData);

    // If activeSym doesn't exist in data, pick first
    if (!allData.find(p => p.symbol === activeSym) && allData.length > 0) {
      activeSym = allData[0].symbol;
    }
    loadPair(activeSym);

  } catch (e) {
    console.error('Fetch error:', e);
    document.getElementById('reasonsBar').innerHTML =
      '<span style="color:var(--red)">⚠ Could not reach server — retrying in 60s</span>';
  }
}

/* ─────────────────────────────────────────
   COUNTDOWN + AUTO REFRESH
───────────────────────────────────────── */
function startCountdown() {
  if (countdownT) clearInterval(countdownT);
  countdownV = REFRESH_S;
  const fill  = document.getElementById('countdownFill');
  const secEl = document.getElementById('countdownSec');
  countdownT = setInterval(() => {
    countdownV = Math.max(0, countdownV - 1);
    fill.style.width = ((countdownV / REFRESH_S) * 100) + '%';
    secEl.textContent = countdownV + 's';
    if (countdownV === 0) {
      clearInterval(countdownT);
      fetchData().then(startCountdown);
    }
  }, 1000);
}

/* ─────────────────────────────────────────
   INIT
───────────────────────────────────────── */
initChart();
fetchData().then(startCountdown);

/* Live price flash every 15s (re-fetch just price from the active pair) */
setInterval(async () => {
  try {
    const res  = await fetch(API + '/api/candles?ts=' + Date.now());
    const data = await res.json();
    allData = data.pairs || [];

    const pair = allData.find(p => p.symbol === activeSym);
    if (!pair || !pair.price) return;

    /* Update displayed price */
    const priceEl  = document.getElementById('chPrice');
    const changeEl = document.getElementById('chChange');
    const chg      = priceChange(pair.price, pair.prevPrice, activeSym);
    priceEl.textContent  = fmtPrice(pair.price, activeSym);
    priceEl.className    = 'ch-price ' + chg.cls;
    changeEl.textContent = chg.label;
    changeEl.className   = 'ch-change ' + chg.cls;

    /* Update last candle close with current price (live tick feel) */
    if (candleSeries && pair.candles && pair.candles.length > 0) {
      const raw  = pair.candles;
      const last = raw[raw.length - 1];
      const t    = candleTime(last.time);
      if (t > 0) {
        candleSeries.update({
          time:  t,
          open:  parseFloat(last.open),
          high:  Math.max(parseFloat(last.high), pair.price),
          low:   Math.min(parseFloat(last.low),  pair.price),
          close: pair.price,
        });
      }
    }

    /* Update sidebar prices */
    buildSidebar(allData);
  } catch(e) {}
}, 15000);
</script>
